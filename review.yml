    - GET    https://data.castoredc.com/api/user/{user_id}
    - GET    https://data.castoredc.com/api/study/{study_id}/user
  modeledNote: |
    endpointsModeled entries follow Castor's documented resource model and the
    coverage of the official R and Python wrapper packages, but the exact path or
    shape was inferred and should be verified against https://data.castoredc.com/api
    during reconciliation. The user, survey, and report resources are documented as
    supported by the wrappers; the precise REST paths above are the modeled form.
sources:
  - url: https://helpdesk.castoredc.com/hc/en-us/articles/27149233860509-Castor-EDC-CDMS-Application-Programming-Interface-API
    type: Documentation
    note: Confirms REST API, base URL https://data.castoredc.com/api, and OAuth2 Client Credentials flow. No WebSocket mentioned.
  - url: https://data.castoredc.com/api
    type: APIReference
    note: Interactive API reference (Swagger) listing study, participant, institute, field, data-points, audit-trail, export, country endpoints.
  - url: https://helpdesk.castoredc.com/application-programming-interface-api/parameters-used-in-the-api
    type: Documentation
    note: GUID (8-4-4-4-12) ID format for study/field/instance IDs; participant ID is the exception.
  - url: https://helpdesk.castoredc.com/hc/en-us/articles/27223902602909-API-troubleshooting-EDC-CDMS
    type: Documentation
    note: API troubleshooting, including the default 600-requests-per-10-minutes rate limit and 429 responses.
  - url: https://github.com/reiniervlinschoten/castoredc_api
    type: SourceCode
    note: Open-source Python wrapper covering study, participant, institute, user, field, report, survey, audit-trail, and metadata endpoints.
  - url: https://openresearchsoftware.metajnl.com/articles/10.5334/jors.436
    type: Reference
    note: Journal of Open Research Software paper describing the CastorEDC API Python package and endpoint coverage.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Castor's public API is request/response
    REST over HTTPS with OAuth2 client-credentials auth, returning paginated HAL
    JSON, plus batch CSV export endpoints. No AsyncAPI document was created because
    there is no server-push transport (WebSocket or SSE) on Castor's own API to
    model.
