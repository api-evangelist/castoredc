    - GET    https://data.castoredc.com/api/study/{study_id}/data-points/study
    - GET    https://data.castoredc.com/api/study/{study_id}/participant/{participant_id}/data-points/study
    - POST   https://data.castoredc.com/api/study/{study_id}/participant/{participant_id}/data-points/study
    - GET    https://data.castoredc.com/api/study/{study_id}/participant/{participant_id}/data-points/repeating-data-instance
    - POST   https://data.castoredc.com/api/study/{study_id}/participant/{participant_id}/data-points/repeating-data-instance/{repeating_data_instance_id}
    - GET    https://data.castoredc.com/api/study/{study_id}/participant/{participant_id}/data-points/survey-instance
