aid: castoredc
name: Castor
review:
  question: Does Castor expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Castor's public interface (the Castor EDC /
    CDMS API at https://data.castoredc.com/api) is request/response REST over HTTPS
    with OAuth2 client-credentials auth. There is no server-push transport
    (WebSocket or SSE) documented on Castor's API to model. Castor delivers data
    changes to consumers by polling the REST data-point and audit-trail endpoints
    or by requesting batch exports - not through a realtime bidirectional channel.
findings:
  summary: |
    Castor does not publish a documented public WebSocket API. Castor (Castor EDC /
    CDMS) is a cloud electronic data capture and clinical data management platform.
    Its public API is a RESTful HTTP API at base URL https://data.castoredc.com/api
    (with a US region at https://us.castoredc.com/api), authenticated with OAuth2
    using the Client Credentials flow: clients POST client_id, client_secret, and
    grant_type=client_credentials to /oauth/token to obtain a Bearer access token
    valid for 5 hours. All resources - studies, participants (records), institutes,
    users, fields (and field dependencies, option groups, validations), study data
    points, reports / repeating data, surveys and survey packages, audit trail, and
    batch data export - are exposed as pure request/response REST, returning
    paginated HAL JSON collections. Integration and analysis are commonly done via
    the official R (castoRedc) and Python (castoredc-api) wrapper packages. No
    realtime, bidirectional, or streaming WebSocket (ws:// or wss://) endpoint is
    documented anywhere in Castor's API reference or helpdesk as of the review date.
  openSource: |
    The Castor EDC / CDMS platform itself is proprietary, closed-source SaaS. The
    client tooling around the API is open source: the official Python wrapper
    (github.com/reiniervlinschoten/castoredc_api, published on PyPI as
    castoredc-api and described in the Journal of Open Research Software) and an R
    package are community/vendor maintained and interact with the documented REST
    endpoints. There is no self-hostable server component.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://data.castoredc.com/api
      documented: true
      note: Full EDC / CDMS API. OAuth2 client-credentials Bearer auth. US region at https://us.castoredc.com/api.
    - protocol: OAuth2 Token
      scheme: https
      documented: true
      note: POST /oauth/token with grant_type=client_credentials returns a Bearer token valid 5 hours.
    - protocol: Batch Export
      scheme: https
      documented: true
      note: GET /study/{study_id}/export/data|structure|optiongroups returns CSV bulk exports. HTTP request/response, not streaming.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Castor's API reference or helpdesk as of the review date.
  endpointsConfirmed:
