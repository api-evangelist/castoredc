aid: castoredc
url: https://raw.githubusercontent.com/api-evangelist/castoredc/refs/heads/main/apis.yml
name: Castor
kind: company
description: Castor (Castor EDC / CDMS) is a cloud electronic data capture (EDC) and
  clinical data management platform for clinical trials and real-world research. Its
  RESTful API at https://data.castoredc.com/api exposes study configuration and
  collected data - studies, participants (records), institutes (sites), users,
  fields and field metadata, study data points, repeating data (reports), surveys
  and survey packages, audit trail, and batch data export - authenticated with
  OAuth2 client-credentials. The API is used to integrate Castor with external
  systems, automate data entry and extraction, and support statistical analysis via
  the official R and Python wrapper packages.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Clinical Trials
- Electronic Data Capture
