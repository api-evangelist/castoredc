meters:
- name: study_subscription
  description: Per-study subscription - the primary Castor cost driver, quoted by study size and duration.
  unit: study
  aggregation: sum
  dimensions:
  - account
  - study
  - region
- name: users
  description: Contracted users / seats with access to a study, a factor in the study quote.
  unit: users
  aggregation: max
  dimensions:
  - study
- name: modules
  description: Optional modules enabled per study (surveys / ePRO, randomization, eConsent) that add to the subscription.
  unit: modules
  aggregation: sum
  dimensions:
  - study
- name: api_requests
  description: API requests consumed - not billed, but bounded by rate limits; track for capacity, not cost.
  unit: requests
  aggregation: sum
  dimensions:
  - client
  - study
principles:
- name: Visibility
  description: Track subscriptions and enabled modules per study and per sponsor / CRO portfolio; API calls are free but should be monitored against rate limits.
- name: Allocation
  description: Allocate cost by study (and by sponsor / therapeutic program for portfolios), since billing is per study rather than per API call.
- name: Optimization
  description: Right-size the module set and user count per study, retire or archive completed studies, and consolidate integrations to a single API client to stay within rate limits without extra spend.
- name: Accountability
  description: Assign a study owner / budget holder per study; review subscription renewals and module usage against actual trial activity.
