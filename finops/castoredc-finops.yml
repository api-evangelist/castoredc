description: >-
  FinOps view of Castor spend. Castor EDC / CDMS is a subscription SaaS billed per
  study rather than by API consumption - cost is driven by the number and size of
  studies, contracted users, study duration, enabled modules (surveys / ePRO,
  randomization, eConsent), region, and compliance requirements, all negotiated by
  quote. The REST API is included with a study subscription and carries no
  per-call charge; it is governed by rate limits rather than metered billing. For
  cost management, the unit of allocation is the study (and, within a sponsor / CRO
  portfolio, the set of studies), not tokens or requests.
notes: >-
  Castor does not publish list pricing or a usage-metered billing model for the
  API; there are no per-call meters to reconcile in FOCUS terms. The meters below
  describe the subscription cost drivers, not API usage charges. Verify contracted
  terms with Castor sales and the helpdesk "Costs and payment" section.
